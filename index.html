<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario Eventos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Prevenir scroll no deseado, efecto "overscroll" nativo */
        body { overscroll-behavior-y: none; background-color: #e5e7eb; }
        /* Ocultar scrollbar pero permitir scroll fluido */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Animaciones suaves */
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="font-sans h-screen w-screen overflow-hidden flex justify-center items-center fixed inset-0 select-none">

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="w-full max-w-md h-full bg-[#f4f5f7] flex flex-col relative overflow-hidden shadow-2xl sm:h-[90vh] sm:rounded-[2.5rem] sm:border-[8px] sm:border-gray-900 bg-cover bg-center">
        
        <!-- HEADER BLANCO CURVO -->
        <div class="bg-white rounded-b-[2rem] shadow-[0_4px_20px_rgba(0,0,0,0.03)] z-20 relative pb-2">
            
            <!-- Barra Superior (Mes, Hoy, Flechas, Sync) -->
            <div class="flex items-center justify-between pt-6 pb-2 px-5">
                <div class="flex items-center gap-2">
                    <h2 id="month-title" class="text-2xl font-black text-gray-800 capitalize tracking-tight">Mes, Año</h2>
                </div>
                <div class="flex items-center gap-1">
                    <!-- Botón de Respaldo Nube -->
                    <button id="btn-sync" class="mr-2 p-2 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-full smooth-transition active:scale-95 relative" title="Respaldar en la nube">
                        <i id="sync-icon" data-lucide="cloud-off" class="w-5 h-5 text-gray-500"></i>
                        <span id="sync-badge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
                    </button>

                    <button id="btn-today" class="mr-1 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold rounded-full smooth-transition active:scale-95">
                        HOY
                    </button>
                    <button id="btn-prev-month" class="p-1.5 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-full smooth-transition active:scale-95">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <button id="btn-next-month" class="p-1.5 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-full smooth-transition active:scale-95">
                        <i data-lucide="chevron-right" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>

            <!-- Días de la semana header -->
            <div class="grid grid-cols-7 px-4 pt-2" id="weekdays-header">
                <!-- Se llena con JS -->
            </div>

            <!-- Grid del calendario -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-y-1 px-4 pb-4 mt-2">
                <!-- Se llena con JS -->
            </div>
        </div>

        <!-- ZONA DE NOTAS (Con Scroll) -->
        <div id="main-scroll-area" class="flex-1 overflow-y-auto no-scrollbar relative z-10 pt-4 pb-24 px-4">
            
            <!-- Separador Fecha Elegante -->
            <div class="flex items-center justify-between mb-4 sticky top-0 bg-[#f4f5f7]/90 backdrop-blur-md z-10 py-2">
                <h3 id="date-banner" class="text-lg font-black text-gray-800 tracking-tight">Fecha Actual</h3>
                <span id="notes-count" class="text-xs font-bold bg-gray-200 text-gray-600 px-2.5 py-1 rounded-full">0 eventos</span>
            </div>

            <!-- Lista de Notas -->
            <div id="notes-list" class="flex flex-col gap-3">
                <!-- Se llena con JS -->
            </div>
        </div>

        <!-- BOTÓN DE ACCIÓN FLOTANTE (FAB) -->
        <button id="btn-add-event" class="absolute bottom-6 right-6 w-14 h-14 bg-red-600 hover:bg-red-700 text-white rounded-full shadow-[0_8px_20px_rgba(220,38,38,0.4)] flex items-center justify-center z-30 smooth-transition active:scale-90 active:shadow-md">
            <i data-lucide="plus" class="w-7 h-7"></i>
        </button>

        <!-- MODAL: EDITOR DE NOTAS (Con altura inteligente para Teclado) -->
        <div id="editor-modal" class="fixed inset-0 z-50 bg-black/50 flex items-start pt-10 sm:items-center justify-center p-4 sm:p-5 backdrop-blur-sm opacity-0 pointer-events-none smooth-transition sm:absolute sm:rounded-[2.5rem]">
            <div id="editor-card" class="bg-white w-full max-w-sm h-[380px] sm:h-[450px] max-h-[85vh] rounded-[2rem] shadow-2xl flex flex-col overflow-hidden transform scale-95 smooth-transition">
                
                <!-- Cabecera del Editor -->
                <div class="flex items-center justify-between px-6 pb-4 pt-5 border-b border-gray-100 bg-white shrink-0">
                    <button id="btn-close-editor" class="text-gray-500 font-medium active:scale-95 smooth-transition">Cancelar</button>
                    <div id="editor-title" class="font-bold text-lg text-gray-900">Nueva Nota</div>
                    <button id="btn-save-note" class="text-red-600 font-bold active:scale-95 smooth-transition disabled:opacity-40 disabled:scale-100">Guardar</button>
                </div>
                
                <!-- Área de Trabajo -->
                <div class="flex-1 bg-gray-50 p-4 flex flex-col gap-3 overflow-hidden">
                    <div class="flex justify-end shrink-0">
                        <button id="btn-paste-text" class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] active:bg-gray-50 active:scale-95 smooth-transition font-bold text-sm">
                            <i data-lucide="clipboard-paste" class="w-4 h-4 text-blue-600"></i> Pegar texto
                        </button>
                    </div>
                    
                    <!-- maxlength de 5000 para prevenir desbordamiento malicioso de memoria/cuota de Base de datos -->
                    <textarea id="note-textarea" maxlength="5000" placeholder="Pega el texto de WhatsApp aquí..." class="w-full flex-1 p-5 bg-white border border-gray-200 rounded-2xl shadow-sm resize-none focus:outline-none focus:border-red-400 focus:ring-2 focus:ring-red-100 text-lg text-gray-800 placeholder-gray-400 leading-relaxed"></textarea>
                </div>
            </div>
        </div>

        <!-- MODAL: VISTA PREVIA -->
        <div id="preview-modal" class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-5 backdrop-blur-sm opacity-0 pointer-events-none smooth-transition sm:absolute sm:rounded-[2.5rem]">
            <div id="preview-card" class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl flex flex-col overflow-hidden transform scale-95 smooth-transition">
                <div class="p-6 max-h-[60vh] overflow-y-auto no-scrollbar relative">
                    <div class="absolute top-0 left-0 w-full h-8 bg-gradient-to-b from-white to-transparent pointer-events-none"></div>
                    <!-- renderizado seguro usando textContent protegido por JS puro -->
                    <p id="preview-text" class="text-gray-800 text-[15px] sm:text-base whitespace-pre-wrap font-medium leading-relaxed pt-2"></p>
                    <div class="absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-white to-transparent pointer-events-none"></div>
                </div>
                
                <div class="bg-gray-50 p-4 grid grid-cols-2 gap-3 border-t border-gray-100">
                    <button id="btn-preview-delete" class="py-3.5 text-red-600 font-bold bg-white border border-gray-200 rounded-xl smooth-transition active:bg-red-50 active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Borrar
                    </button>
                    <button id="btn-preview-edit" class="py-3.5 text-white font-bold bg-gray-900 rounded-xl smooth-transition active:bg-gray-800 active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="edit-2" class="w-4 h-4"></i> Editar
                    </button>
                </div>
                
                <button id="btn-close-preview" class="absolute top-4 right-4 w-8 h-8 bg-gray-100 text-gray-600 rounded-full flex items-center justify-center smooth-transition active:bg-gray-200 active:scale-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- MODAL: SINCRONIZACIÓN GOOGLE -->
        <div id="sync-modal" class="fixed inset-0 z-[60] bg-black/60 flex items-center justify-center p-5 backdrop-blur-sm opacity-0 pointer-events-none smooth-transition sm:absolute sm:rounded-[2.5rem]">
            <div id="sync-card" class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl flex flex-col overflow-hidden transform scale-95 smooth-transition p-6 text-center relative">
                <button id="btn-close-sync" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-500">
                    <i data-lucide="cloud" class="w-8 h-8"></i>
                </div>
                
                <h3 id="sync-title" class="text-xl font-black text-gray-900 mb-2">Respaldar Calendario</h3>
                <p id="sync-desc" class="text-sm text-gray-600 mb-6 leading-relaxed">
                    Tus eventos están guardados solo en este dispositivo. Inicia sesión con Google para respaldarlos en la nube y verlos en otros celulares o tablets.
                </p>
                
                <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 py-3.5 bg-gray-900 text-white font-bold rounded-xl active:scale-95 smooth-transition">
                    <i data-lucide="user-check" class="w-5 h-5"></i> Iniciar con Google
                </button>
            </div>
        </div>

    </div>

    <!-- SCRIPT DE LA APLICACIÓN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, linkWithRedirect, signInWithRedirect, getRedirectResult, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDOX-xR-Bv-tWDmIQmuYYfYo0DSqiNBTVM",
            authDomain: "calendarioeqb.firebaseapp.com",
            projectId: "calendarioeqb",
            storageBucket: "calendarioeqb.firebasestorage.app",
            messagingSenderId: "724326817821",
            appId: "1:724326817821:web:c946c98ae27c6c368fa6f4"
        };
            
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error("No se pudo conectar a Firebase:", error);
        }

        const googleProvider = new GoogleAuthProvider();
        googleProvider.setCustomParameters({ prompt: 'select_account' });
        
        const targetAppId = typeof __app_id !== 'undefined' ? __app_id : 'mi-app-calendario-seguro';

        // --- UTILIDADES ---
        const MONTH_NAMES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const DAY_NAMES = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const DAY_NAMES_SHORT = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

        const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
        const getFirstDayOfMonth = (year, month) => {
            const day = new Date(year, month, 1).getDay();
            return day === 0 ? 6 : day - 1; 
        };
        const isSameDay = (date1, date2) => date1.getFullYear() === date2.getFullYear() && date1.getMonth() === date2.getMonth() && date1.getDate() === date2.getDate();
        const formatDateKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

        // --- ESTADO ---
        let user = null;
        let notes = [];
        let currentDate = new Date();
        let selectedDate = new Date();
        let editingNoteId = null;
        let previewNoteObj = null;
        let unsubscribeSnapshot = null;

        // --- ELEMENTOS ---
        const elMonthTitle = document.getElementById('month-title');
        const elCalendarGrid = document.getElementById('calendar-grid');
        const elDateBanner = document.getElementById('date-banner');
        const elNotesCount = document.getElementById('notes-count');
        const elNotesList = document.getElementById('notes-list');
        const elTextarea = document.getElementById('note-textarea');
        const elBtnSaveNote = document.getElementById('btn-save-note');
        const elBtnPasteText = document.getElementById('btn-paste-text');
        const elScrollArea = document.getElementById('main-scroll-area');

        // Modales
        const modalEditor = document.getElementById('editor-modal');
        const cardEditor = document.getElementById('editor-card');
        const modalPreview = document.getElementById('preview-modal');
        const cardPreview = document.getElementById('preview-card');
        const modalSync = document.getElementById('sync-modal');
        const cardSync = document.getElementById('sync-card');

        // --- RENDERIZADO DEL CALENDARIO ---
        const initWeekdays = () => {
            const header = document.getElementById('weekdays-header');
            DAY_NAMES_SHORT.forEach(day => {
                const div = document.createElement('div');
                div.className = "text-center text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2";
                div.textContent = day; 
                header.appendChild(div);
            });
        };

        const updateUI = () => {
            renderCalendar();
            renderBanner();
            renderNotes();
            updateAuthUI();
            lucide.createIcons();
        };

        const updateAuthUI = () => {
            const btnSync = document.getElementById('btn-sync');
            if (user && !user.isAnonymous) {
                btnSync.innerHTML = `
                    <i data-lucide="cloud-check" class="w-5 h-5 text-green-600"></i>
                    <span id="sync-badge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
                `;
            } else {
                btnSync.innerHTML = `
                    <i data-lucide="cloud-off" class="w-5 h-5 text-gray-500"></i>
                    <span id="sync-badge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
                `;
            }
            // Asegurarse de volver a procesar los iconos para no perder la visualización
            if(window.lucide) window.lucide.createIcons();
        };

        const renderCalendar = () => {
            elCalendarGrid.innerHTML = ''; 
            elMonthTitle.textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = getDaysInMonth(year, month);
            const firstDayIndex = getFirstDayOfMonth(year, month);

            const notesByDate = {};
            notes.forEach(n => {
                if (!notesByDate[n.dateKey]) notesByDate[n.dateKey] = [];
                notesByDate[n.dateKey].push(n);
            });

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = "aspect-square";
                elCalendarGrid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(year, month, i);
                const isToday = isSameDay(date, new Date());
                const isSelected = isSameDay(date, selectedDate);
                const dateKey = formatDateKey(date);
                const dayNotes = notesByDate[dateKey] || [];
                const hasNotes = dayNotes.length > 0;

                const cell = document.createElement('div');
                cell.className = "aspect-square flex flex-col items-center justify-center relative cursor-pointer group";
                
                cell.onclick = () => {
                    selectedDate = date;
                    currentDate = new Date(date); 
                    updateUI();
                };

                let circleClass = "w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full text-[15px] sm:text-base font-medium smooth-transition ";
                if (isSelected) {
                    circleClass += "bg-gray-900 text-white shadow-md transform scale-110";
                } else if (isToday) {
                    circleClass += "bg-red-50 text-red-600 font-bold";
                } else {
                    circleClass += "text-gray-700 group-hover:bg-gray-100";
                }

                const span = document.createElement('div');
                span.className = circleClass;
                span.textContent = i; 

                cell.appendChild(span);

                if (hasNotes) {
                    const dot = document.createElement('div');
                    dot.className = `absolute bottom-1 w-1.5 h-1.5 rounded-full smooth-transition ${isSelected ? 'bg-white' : 'bg-red-500'}`;
                    cell.appendChild(dot);
                }

                elCalendarGrid.appendChild(cell);
            }
        };

        const renderBanner = () => {
            elDateBanner.textContent = `${DAY_NAMES[selectedDate.getDay()]}, ${selectedDate.getDate()} de ${MONTH_NAMES[selectedDate.getMonth()].toLowerCase()}`;
            const dateKey = formatDateKey(selectedDate);
            const count = notes.filter(n => n.dateKey === dateKey).length;
            elNotesCount.textContent = count === 1 ? '1 evento' : `${count} eventos`;
        };

        const renderNotes = () => {
            elNotesList.innerHTML = '';
            const dateKey = formatDateKey(selectedDate);
            const selectedDayNotes = notes.filter(n => n.dateKey === dateKey);

            if (selectedDayNotes.length === 0) {
                elNotesList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-gray-400 opacity-60">
                        <i data-lucide="coffee" class="w-12 h-12 mb-3"></i>
                        <p class="text-[15px] font-medium">No hay eventos para hoy</p>
                    </div>`;
                return;
            }

            selectedDayNotes.forEach(note => {
                const noteDiv = document.createElement('div');
                noteDiv.className = "bg-white p-4 rounded-2xl shadow-[0_2px_10px_rgba(0,0,0,0.04)] border border-gray-100 flex items-start gap-4 active:scale-[0.98] smooth-transition cursor-pointer group";
                
                noteDiv.onclick = () => openPreview(note);

                const iconContainer = document.createElement('div');
                iconContainer.className = "w-10 h-10 rounded-xl bg-red-50 flex items-center justify-center flex-shrink-0 text-red-500 group-hover:bg-red-100 smooth-transition";
                iconContainer.innerHTML = '<i data-lucide="align-left" class="w-5 h-5"></i>';

                const textContainer = document.createElement('div');
                textContainer.className = "flex-1 min-w-0 pt-0.5 pointer-events-none";
                const pText = document.createElement('p');
                pText.className = "text-gray-800 text-[14px] sm:text-[15px] whitespace-pre-wrap font-medium leading-snug line-clamp-3";
                
                // ASIGNACIÓN SEGURA: previene la inyección de código (XSS)
                pText.textContent = note.content; 
                
                const timeStr = new Date(note.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const pTime = document.createElement('p');
                pTime.className = "text-gray-400 text-[11px] font-bold mt-1.5 flex items-center uppercase tracking-wider";
                pTime.innerHTML = `<i data-lucide="clock" class="w-3 h-3 mr-1"></i> ${timeStr}`;
                
                textContainer.appendChild(pText);
                textContainer.appendChild(pTime);

                noteDiv.appendChild(iconContainer);
                noteDiv.appendChild(textContainer);
                elNotesList.appendChild(noteDiv);
            });
        };

        // --- LÓGICA DE AUTENTICACIÓN Y PROTECCIÓN DE DATOS ---
        const initDataFlow = async () => {
            initWeekdays();
            updateUI();

            // Evitar crash si falla la inicialización de Firebase local
            if (!auth || !db) return;

            try {
                await auth.authStateReady();

                // 1. REVISAR SI VENIMOS DE UNA REDIRECCIÓN DE GOOGLE (Solución Bug Móvil)
                try {
                    const redirectResult = await getRedirectResult(auth);
                    if (redirectResult) {
                        // Sincronización exitosa, la página carga ya con el usuario vinculado de Google
                        console.log("Sincronización exitosa con Google.");
                    }
                } catch (error) {
                    if (error.code === 'auth/credential-already-in-use') {
                        // El correo de Google ya tenía datos guardados previamente. 
                        // Iniciamos sesión normal con esa cuenta en lugar de vincular la nueva.
                        await signInWithRedirect(auth, googleProvider);
                        return; // Detenemos la ejecución porque la página va a recargar
                    } else {
                        console.error("Error al volver de Google:", error);
                        alert("Hubo un error al conectar con Google: " + error.message);
                    }
                }

                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (currentUser) => {
                    user = currentUser;
                    
                    if (!user) {
                        notes = [];
                        updateUI();
                        if(unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
                        return;
                    }
                    
                    if(unsubscribeSnapshot) unsubscribeSnapshot();
                    
                    const notesRef = collection(db, 'artifacts', targetAppId, 'users', user.uid, 'notes');
                    
                    unsubscribeSnapshot = onSnapshot(notesRef, (snapshot) => {
                        notes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        updateUI();
                    }, (error) => {
                        console.error("Error al obtener los datos de Firestore (verifica las reglas):", error);
                    });
                });
            } catch (error) { 
                console.error("Error iniciando app:", error); 
            }
        };

        const handleGoogleLogin = async () => {
            try {
                if (user && user.isAnonymous) {
                    // Usamos Redirect en lugar de Popup para garantizar la compatibilidad móvil
                    await linkWithRedirect(user, googleProvider);
                } else {
                    await signInWithRedirect(auth, googleProvider);
                }
            } catch (error) {
                console.error("Error iniciando redirección:", error);
                alert("Hubo un problema al iniciar la conexión segura: " + error.message);
            }
        };

        const openSync = () => {
            if (user && !user.isAnonymous) {
                if(window.confirm("Ya tienes tu calendario respaldado. ¿Deseas cerrar sesión en este dispositivo?")) {
                    signOut(auth).then(() => {
                        notes = [];
                        window.location.reload(); 
                    });
                }
                return;
            }
            
            elScrollArea.classList.replace('overflow-y-auto', 'overflow-hidden');
            modalSync.classList.remove('pointer-events-none', 'opacity-0');
            setTimeout(() => cardSync.classList.replace('scale-95', 'scale-100'), 10);
        };

        const closeSync = () => {
            cardSync.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                modalSync.classList.add('opacity-0', 'pointer-events-none');
                elScrollArea.classList.replace('overflow-hidden', 'overflow-y-auto');
            }, 200);
        };

        // --- ACCIONES DE NOTA (PROTEGIDAS) ---
        const saveNoteAction = async () => {
            if (!user || !user.uid) {
                alert("Error de seguridad: Sesión no autorizada.");
                return;
            }

            const content = elTextarea.value.trim().substring(0, 5000); 
            const dateKey = formatDateKey(selectedDate);
            if (!content) return;

            elBtnSaveNote.disabled = true;

            try {
                const notesRef = collection(db, 'artifacts', targetAppId, 'users', user.uid, 'notes');
                if (editingNoteId) {
                    await updateDoc(doc(db, 'artifacts', targetAppId, 'users', user.uid, 'notes', editingNoteId), {
                        content: content, updatedAt: Date.now()
                    });
                } else {
                    await addDoc(notesRef, {
                        dateKey: dateKey, content: content, createdAt: Date.now(), updatedAt: Date.now()
                    });
                }
                closeEditor();
            } catch (error) { 
                console.error("Error al guardar:", error); 
                alert("No se pudo guardar. Verifica tu conexión y los permisos de seguridad.");
            } 
            finally { elBtnSaveNote.disabled = false; }
        };

        const deleteNoteAction = async (noteId) => {
            if (!user || !user.uid) {
                alert("Error de seguridad: Sesión no autorizada.");
                return;
            }

            if(window.confirm("¿Eliminar este evento permanentemente?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', targetAppId, 'users', user.uid, 'notes', noteId));
                    // BUG FIX: Si se borra mientras el editor está abierto, lo cierra por seguridad
                    if (editingNoteId === noteId) closeEditor();
                } catch (error) { 
                    console.error("Error al borrar:", error); 
                    alert("No se pudo eliminar. Verifica tu conexión.");
                }
            }
        };

        const handlePasteClick = async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    if (elTextarea.value) { elTextarea.value += '\n' + text; } 
                    else { elTextarea.value = text; }
                    
                    // BUG FIX: Respetar límite de caracteres incluso al inyectar por JavaScript
                    if (elTextarea.value.length > 5000) {
                        elTextarea.value = elTextarea.value.substring(0, 5000);
                        alert("El texto se ha recortado a 5000 caracteres para evitar errores.");
                    }
                    
                    validateTextarea();
                    if(window.innerWidth > 640) elTextarea.focus();
                }
            } catch (err) {
                alert('Tu navegador ha bloqueado el acceso al portapapeles por seguridad. Por favor, mantén presionado el cuadro de texto y selecciona "Pegar".');
            }
        };

        // --- CONTROL DE MODALES (Bloqueo de fondo) ---
        const openEditor = (note = null) => {
            elScrollArea.classList.replace('overflow-y-auto', 'overflow-hidden');
            modalEditor.classList.remove('pointer-events-none', 'opacity-0');
            setTimeout(() => cardEditor.classList.replace('scale-95', 'scale-100'), 10);
            
            if (note) {
                editingNoteId = note.id;
                elTextarea.value = note.content;
                document.getElementById('editor-title').textContent = 'Editar Evento';
            } else {
                editingNoteId = null;
                elTextarea.value = '';
                document.getElementById('editor-title').textContent = 'Nueva Nota';
            }
            validateTextarea();
        };

        const closeEditor = () => {
            cardEditor.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                modalEditor.classList.add('opacity-0', 'pointer-events-none');
                editingNoteId = null;
                elTextarea.value = '';
                elScrollArea.classList.replace('overflow-hidden', 'overflow-y-auto');
            }, 200);
        };

        const openPreview = (note) => {
            elScrollArea.classList.replace('overflow-y-auto', 'overflow-hidden');
            previewNoteObj = note;
            document.getElementById('preview-text').textContent = note.content;
            
            modalPreview.classList.remove('pointer-events-none', 'opacity-0');
            setTimeout(() => cardPreview.classList.replace('scale-95', 'scale-100'), 10);
        };

        const closePreview = () => {
            cardPreview.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                modalPreview.classList.add('opacity-0', 'pointer-events-none');
                previewNoteObj = null;
                elScrollArea.classList.replace('overflow-hidden', 'overflow-y-auto');
            }, 200);
        };

        const preventTouchScroll = (e) => {
            if (e.target === modalEditor || e.target === modalPreview || e.target === modalSync) e.preventDefault();
        };
        modalEditor.addEventListener('touchmove', preventTouchScroll, { passive: false });
        modalPreview.addEventListener('touchmove', preventTouchScroll, { passive: false });
        modalSync.addEventListener('touchmove', preventTouchScroll, { passive: false });

        const validateTextarea = () => { elBtnSaveNote.disabled = elTextarea.value.trim().length === 0; };

        // --- LISTENERS (FIX BUG Día 31: Agregando .setDate(1) antes de cambiar mes) ---
        document.getElementById('btn-prev-month').addEventListener('click', () => { 
            currentDate.setDate(1); 
            currentDate.setMonth(currentDate.getMonth() - 1); 
            updateUI(); 
        });
        
        document.getElementById('btn-next-month').addEventListener('click', () => { 
            currentDate.setDate(1); 
            currentDate.setMonth(currentDate.getMonth() + 1); 
            updateUI(); 
        });
        
        document.getElementById('btn-today').addEventListener('click', () => { currentDate = new Date(); selectedDate = new Date(); updateUI(); });
        document.getElementById('btn-add-event').addEventListener('click', () => openEditor());
        
        document.getElementById('btn-sync').addEventListener('click', openSync);
        document.getElementById('btn-google-login').addEventListener('click', handleGoogleLogin);
        document.getElementById('btn-close-sync').addEventListener('click', closeSync);
        modalSync.addEventListener('click', (e) => { if(e.target === modalSync) closeSync(); });

        document.getElementById('btn-close-editor').addEventListener('click', closeEditor);
        elBtnSaveNote.addEventListener('click', saveNoteAction);
        elBtnPasteText.addEventListener('click', handlePasteClick);
        elTextarea.addEventListener('input', validateTextarea);

        modalEditor.addEventListener('click', (e) => { if(e.target === modalEditor) closeEditor(); });
        modalPreview.addEventListener('click', (e) => { if(e.target === modalPreview) closePreview(); });
        
        document.getElementById('btn-close-preview').addEventListener('click', closePreview);
        document.getElementById('btn-preview-delete').addEventListener('click', () => { const id = previewNoteObj.id; closePreview(); setTimeout(()=>deleteNoteAction(id), 250); });
        document.getElementById('btn-preview-edit').addEventListener('click', () => { const n = previewNoteObj; closePreview(); setTimeout(()=>openEditor(n), 250); });

        initDataFlow();

    </script>
</body>
</html>
